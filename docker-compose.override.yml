services:
  postgres:
    # Host 5432 is occupied by an unrelated container; publish on 5433 instead.
    # `!override` fully replaces the base ports list (Compose otherwise appends).
    # The backend still reaches Postgres internally on 5432 via the compose network.
    ports: !override
      - "5433:5432"
  backend:
    # Host 8080 is occupied by an unrelated Java service; publish on 8090 instead.
    ports: !override
      - "8090:8080"
