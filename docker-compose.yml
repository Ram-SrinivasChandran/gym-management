services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gymdb
      POSTGRES_USER: gymadmin
      POSTGRES_PASSWORD: gymadmin
    ports:
      - "5432:5432"
    volumes:
      - gym_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymadmin -d gymdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/gym-api
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymdb
      DB_USERNAME: gymadmin
      DB_PASSWORD: gymadmin
      JWT_SECRET: local-dev-secret-key-change-in-production-min-32-bytes!
      # "seed" profile bootstraps a SUPER_ADMIN account for local dev / E2E only — never set in production.
      SPRING_PROFILES_ACTIVE: seed
      GYMPLATFORM_SEED_SUPER_ADMIN_EMAIL: superadmin@platform.local
      GYMPLATFORM_SEED_SUPER_ADMIN_PASSWORD: SuperAdmin123!
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  gym_postgres_data:
