spring:
  application:
    name: gym-api
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gymdb}
    username: ${DB_USERNAME:gymadmin}
    password: ${DB_PASSWORD:gymadmin}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  # Render (and most PaaS) inject the port to bind via $PORT; fall back to SERVER_PORT then 8080 locally.
  port: ${PORT:${SERVER_PORT:8080}}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

gymplatform:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-min-32-bytes!}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7

# Supabase Auth: the backend validates Supabase-issued access tokens (signed by Supabase)
# against the project's JWKS endpoint. SUPABASE_URL is the project URL, e.g.
# https://mzijhzfibysljfpsfurp.supabase.co
supabase:
  url: ${SUPABASE_URL:https://mzijhzfibysljfpsfurp.supabase.co}
  jwt:
    issuer: ${supabase.url}/auth/v1
    jwk-set-uri: ${supabase.url}/auth/v1/.well-known/jwks.json
  storage:
    # service_role key: bypasses Storage RLS. Uploads are proxied through this backend
    # (rather than the mobile app writing to Supabase Storage directly) because the
    # client-side RLS path was unreliable for this project. Server-side only, never shipped
    # to the mobile app.
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    member-photos-bucket: member-photos

logging:
  level:
    com.gymplatform: INFO
