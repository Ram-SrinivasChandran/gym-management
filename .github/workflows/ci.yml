name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────── Lint ─────────────────────────────
  lint-backend:
    name: Lint (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Spotless check
        working-directory: backend/gym-api
        run: mvn -q spotless:check

  lint-mobile:
    name: Lint (mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npm run lint
        working-directory: mobile

  # ─────────────────────────── Unit Tests ───────────────────────────
  unit-tests-backend:
    name: Unit Tests (backend)
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run unit tests
        working-directory: backend/gym-api
        run: mvn -q test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-unit-test-results
          path: backend/gym-api/target/surefire-reports

  unit-tests-mobile:
    name: Unit Tests (mobile)
    runs-on: ubuntu-latest
    needs: lint-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npm test -- --ci
        working-directory: mobile

  # ───────────────────────── Integration Tests ─────────────────────────
  integration-tests-backend:
    name: Integration Tests (backend, Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-tests-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run integration tests + merged coverage check
        working-directory: backend/gym-api
        run: mvn -q verify
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-integration-test-results
          path: |
            backend/gym-api/target/failsafe-reports
            backend/gym-api/target/site/jacoco

  # ───────────────────────────── E2E Tests ─────────────────────────────
  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [unit-tests-backend, unit-tests-mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Start backend stack (postgres + API, with seeded super admin)
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8080/actuator/health > /dev/null; then
              echo "Backend is healthy"; exit 0
            fi
            sleep 3
          done
          echo "Backend did not become healthy in time" && exit 1

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Start Expo web build
        working-directory: mobile
        run: npx expo start --web --port 19006 &
        env:
          CI: "1"

      - name: Wait for Expo web
        run: |
          for i in $(seq 1 30); do
            if curl -fs http://localhost:19006 > /dev/null; then
              echo "Expo web is up"; exit 0
            fi
            sleep 3
          done
          echo "Expo web did not become ready in time" && exit 1

      - name: Install E2E dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          E2E_SUPER_ADMIN_EMAIL: superadmin@platform.local
          E2E_SUPER_ADMIN_PASSWORD: SuperAdmin123!
        run: npx playwright test --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend --tail=200

  # ─────────────────────────── Security Scan ───────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [java, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: actions/setup-java@v4
        if: matrix.language == 'java'
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build backend (for CodeQL Java analysis)
        if: matrix.language == 'java'
        working-directory: backend/gym-api
        run: mvn -q -DskipTests clean package
      - uses: github/codeql-action/analyze@v3

      - name: npm audit (mobile)
        if: matrix.language == 'javascript'
        working-directory: mobile
        run: npm audit --audit-level=critical || true

      - name: npm audit (e2e)
        if: matrix.language == 'javascript'
        working-directory: e2e
        run: npm audit --audit-level=critical || true

  # ──────────────────────────── Docker Build ────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [integration-tests-backend, e2e-tests, security-scan]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/gym-api:${{ github.sha }}"
          docker build -t "$IMAGE" -f backend/gym-api/Dockerfile backend/gym-api
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  # ────────────────────────── Deploy (production) ──────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Push image to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin "${{ vars.ECR_REGISTRY }}"
          docker pull "${{ needs.docker-build.outputs.image }}"
          docker tag "${{ needs.docker-build.outputs.image }}" "${{ vars.ECR_REGISTRY }}/gym-api:${{ github.sha }}"
          docker push "${{ vars.ECR_REGISTRY }}/gym-api:${{ github.sha }}"

      - name: Register new ECS task definition revision
        id: register
        run: |
          NEW_IMAGE="${{ vars.ECR_REGISTRY }}/gym-api:${{ github.sha }}"
          CURRENT_TASK_DEF=$(aws ecs describe-task-definition --task-definition "${{ vars.ECS_TASK_FAMILY }}" --query 'taskDefinition')
          NEW_TASK_DEF=$(echo "$CURRENT_TASK_DEF" | jq --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service to the new revision
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --task-definition "${{ steps.register.outputs.task_def_arn }}"

          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"
